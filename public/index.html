<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trae Agent - وكيل ذكي للمهام البرمجية</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen">
    <!-- Header -->
    <header class="bg-gradient-to-r from-blue-600 to-purple-700 text-white shadow-xl">
        <div class="max-w-6xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3 space-x-reverse">
                    <div class="w-10 h-10 bg-white bg-opacity-20 rounded-full flex items-center justify-center">
                        <i class="fas fa-robot text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold">Trae Agent</h1>
                        <p class="text-blue-100 text-sm">وكيل ذكي للمهام البرمجية</p>
                    </div>
                </div>
                <div class="flex items-center space-x-3 space-x-reverse">
                    <span class="px-3 py-1 bg-white bg-opacity-20 rounded-full text-xs">
                        <i class="fas fa-circle ml-1 text-green-400"></i>
                        متصل
                    </span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 py-6">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- Configuration Panel -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-xl shadow-lg p-5">
                    <h2 class="text-lg font-semibold mb-4 flex items-center text-gray-800">
                        <i class="fas fa-cog ml-2 text-blue-600"></i>
                        الإعدادات
                    </h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">مزود الخدمة</label>
                            <select id="provider" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="openai">OpenAI</option>
                                <option value="anthropic" selected>Anthropic</option>
                                <option value="openrouter">OpenRouter</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">النموذج</label>
                            <select id="model" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
                                <option value="gpt-4o">GPT-4o</option>
                                <option value="gpt-4o-mini">GPT-4o Mini</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">مفتاح API</label>
                            <div class="relative">
                                <input type="password" id="apiKey" placeholder="أدخل مفتاح API" 
                                       class="w-full px-3 py-2 pr-10 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <button type="button" onclick="togglePassword()" class="absolute left-2 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700">
                                    <i id="passwordIcon" class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Quick Tasks -->
                    <div class="mt-6">
                        <h3 class="text-sm font-medium mb-3 text-gray-800">مهام سريعة</h3>
                        <div class="space-y-2">
                            <button onclick="fillTask('إنشاء سكريبت Python لحساب فيبوناتشي')" 
                                    class="w-full text-right px-3 py-2 text-sm bg-gray-50 hover:bg-blue-50 hover:text-blue-700 rounded-lg transition-colors">
                                <i class="fas fa-code ml-2"></i>
                                سكريبت فيبوناتشي
                            </button>
                            <button onclick="fillTask('كتابة اختبارات وحدة لدالة Python')" 
                                    class="w-full text-right px-3 py-2 text-sm bg-gray-50 hover:bg-blue-50 hover:text-blue-700 rounded-lg transition-colors">
                                <i class="fas fa-vial ml-2"></i>
                                اختبارات وحدة
                            </button>
                            <button onclick="fillTask('مراجعة وتحسين الكود للأداء')" 
                                    class="w-full text-right px-3 py-2 text-sm bg-gray-50 hover:bg-blue-50 hover:text-blue-700 rounded-lg transition-colors">
                                <i class="fas fa-search ml-2"></i>
                                مراجعة الكود
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Chat Interface -->
            <div class="lg:col-span-3">
                <div class="bg-white rounded-xl shadow-lg overflow-hidden">
                    <!-- Chat Header -->
                    <div class="bg-gradient-to-r from-purple-600 to-blue-600 text-white p-4">
                        <h2 class="text-lg font-semibold flex items-center">
                            <i class="fas fa-comments ml-2"></i>
                            محادثة الوكيل
                            <span id="statusIndicator" class="mr-3 px-2 py-1 text-xs bg-white bg-opacity-20 rounded-full">جاهز</span>
                        </h2>
                    </div>

                    <!-- Chat Messages -->
                    <div id="chatContainer" class="h-96 overflow-y-auto p-4 space-y-3">
                        <div class="flex items-start space-x-3 space-x-reverse">
                            <div class="w-8 h-8 bg-gradient-to-r from-blue-500 to-purple-600 rounded-full flex items-center justify-center text-white text-sm">
                                <i class="fas fa-robot"></i>
                            </div>
                            <div class="bg-blue-50 rounded-lg p-3 max-w-md">
                                <p class="text-sm text-gray-800">مرحباً! أنا Trae Agent، مساعدك الذكي للمهام البرمجية. كيف يمكنني مساعدتك اليوم؟</p>
                            </div>
                        </div>
                    </div>

                    <!-- Typing Indicator -->
                    <div id="typingIndicator" class="hidden items-center justify-center p-4 space-x-2">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <span class="mr-2 text-sm text-gray-500">الوكيل يفكر...</span>
                    </div>

                    <!-- Input Area -->
                    <div class="border-t border-gray-200 p-4">
                        <form id="taskForm" class="flex space-x-3 space-x-reverse">
                            <input type="text" id="taskInput" placeholder="صف مهمتك البرمجية..." 
                                   class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                   required>
                            <button type="submit" id="submitBtn" 
                                    class="px-6 py-2 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-lg hover:from-blue-700 hover:to-purple-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                                <i class="fas fa-paper-plane ml-2"></i>
                                إرسال
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Results Panel -->
                <div id="resultsPanel" class="mt-4 bg-white rounded-xl shadow-lg p-4 hidden">
                    <h3 class="text-lg font-semibold mb-3 flex items-center text-gray-800">
                        <i class="fas fa-chart-bar ml-2 text-green-600"></i>
                        النتائج
                    </h3>
                    <div id="resultsContent" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="mt-8 bg-gray-800 text-white py-6">
        <div class="max-w-6xl mx-auto px-4 text-center">
            <p class="text-sm text-gray-300">
                <i class="fas fa-robot ml-2"></i>
                Trae Agent - وكيل ذكي للمهام البرمجية
            </p>
            <p class="text-xs text-gray-400 mt-2">مرخص تحت رخصة MIT</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
